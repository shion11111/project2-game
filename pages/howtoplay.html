<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>How to play</title>

    <link rel="stylesheet" href="../styles/style.css">

</head>
<body>
    <!-- How to Play Modal -->
<div class="modal fade" id="howToPlayModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title" id="modalTitle">How to Play: Flag Matcher</h1>
      </div>
      <div class="modal-body">
        <ol>
          <li>Look at the Country Name inside the drop zone.</li>
          <li>Identify the correct flag from the three options provided.</li>
          <li>Drag and drop the correct flag into the box.</li>
          <li>Match all flags correctly to win the round!</li>
        </ol>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn" onclick="window.location.href='../index.html';">Got it!</button>
      </div>
    </div>
  </div>
</div>
<script src="https://jsdelivr.net"></script>
</body>
</html>
